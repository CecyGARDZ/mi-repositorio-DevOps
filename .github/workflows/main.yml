name: Flask CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Construir Docker
        run: docker build -t flask-app .

      - name: Ejecutar contenedor
        run: docker run -d -p 5000:5000 flask-app

      - name: Ver contenedores
        run: docker ps
